<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Our Cookbook</title>
<!-- iOS "Add to Home Screen" support: makes the site behave like an app icon
     with no Safari address bar. See https://support.apple.com/en-il/guide/iphone/iph42ab2f3a7/ios -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Our Cookbook">
<meta name="theme-color" content="#4a7c59">
<link rel="apple-touch-icon" href="images/apple-touch-icon.png">
<link rel="icon" href="images/favicon-32.png" sizes="32x32" type="image/png">
<style>
  :root{
    --fern:#4a7c59;
    --fern-dark:#38604a;
    --marigold:#f9a620;
    --terracotta:#b7472a;
    --cream:#f5f3ed;
    --card:#ffffff;
    --ink:#2f2a22;
    --ink-soft:#6b6455;
    --border:#e2ddd0;
    --radius:14px;
    --shadow:0 2px 10px rgba(47,42,34,0.08);
    --shadow-lg:0 12px 32px rgba(47,42,34,0.14);
    font-size:18px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--cream);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.6;
    min-height:100vh;
  }
  h1,h2,h3,.serif{
    font-family:Georgia,"Iowan Old Style","Palatino Linotype",serif;
    color:var(--fern-dark);
    font-weight:700;
    margin:0 0 .4em;
  }
  a{color:var(--fern-dark)}
  .wrap{max-width:1280px;margin:0 auto;padding:0 24px}

  /* Header */
  header.site{
    position:sticky;top:0;z-index:20;
    background:linear-gradient(180deg, var(--fern) 0%, var(--fern-dark) 100%);
    color:#fff;
    padding:20px 0;
    box-shadow:var(--shadow);
  }
  header.site .header-row{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
  header.site h1{color:#fff;font-size:1.9rem;letter-spacing:.01em;margin:0}
  header.site .meta{color:#e9f2ec;font-size:.88rem;margin-top:2px}
  header.site .titleblock{margin-right:auto}
  .searchbar{
    display:flex;gap:10px;align-items:center;
    background:#fff;border-radius:999px;padding:9px 18px;
    box-shadow:var(--shadow);
    min-width:260px;flex:1;max-width:420px;
  }
  .searchbar input{
    border:none;outline:none;flex:1;font-size:1.02rem;
    font-family:inherit;color:var(--ink);background:transparent;
  }
  .searchbar svg{flex-shrink:0}
  .shopping-btn{
    position:relative;display:flex;align-items:center;gap:8px;
    background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.45);
    color:#fff;padding:9px 18px;border-radius:999px;cursor:pointer;
    font-size:.95rem;font-family:inherit;white-space:nowrap;
  }
  .shopping-btn:hover{background:rgba(255,255,255,.26)}
  .shopping-btn .badge{
    background:var(--marigold);color:#4a3200;font-weight:700;font-size:.78rem;
    border-radius:999px;padding:1px 8px;
  }

  /* Layout: sidebar + main */
  .layout{display:flex;gap:32px;align-items:flex-start;padding:28px 0 80px}
  .sidebar{
    width:230px;flex-shrink:0;
    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:18px 0;
    /* Stays in view while the recipe grid/detail page scrolls, pinned just
       below the sticky header - --header-h is measured and kept in sync by
       JS (updateHeaderHeightVar) since the header's real height depends on
       font metrics and can't be reliably hardcoded. If it scrolls past the
       header's own bottom edge before running out of category items, the
       sidebar scrolls internally instead of running off the top of the
       screen or overlapping the header. */
    position:sticky;
    top:calc(var(--header-h, 92px) + 20px);
    max-height:calc(100vh - var(--header-h, 92px) - 40px);
    overflow-y:auto;
  }
  .sidebar h4{
    margin:0 18px 10px;font-size:.75rem;text-transform:uppercase;letter-spacing:.07em;
    color:var(--ink-soft);
  }
  .nav-item{
    display:flex;justify-content:space-between;align-items:center;
    padding:12px 18px;cursor:pointer;font-size:1rem;color:var(--ink);
    border-left:3px solid transparent;
  }
  .nav-item:hover{background:var(--cream)}
  .nav-item.active{
    background:var(--cream);border-left-color:var(--marigold);
    color:var(--fern-dark);font-weight:700;
  }
  .nav-item .count{
    font-size:.8rem;color:var(--ink-soft);background:var(--cream);
    border-radius:999px;padding:1px 9px;
  }
  .nav-item.active .count{background:#fff}

  main{flex:1;min-width:0}

  /* Recipe grid */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:22px;
  }
  .card{
    background:var(--card);border-radius:var(--radius);overflow:hidden;
    box-shadow:var(--shadow);cursor:pointer;
    transition:transform .15s, box-shadow .15s;
    display:flex;flex-direction:column;
    border:1px solid var(--border);
  }
  .card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
  .card .thumb{
    height:160px;background:linear-gradient(135deg,var(--fern) 0%,var(--marigold) 100%);
    display:flex;align-items:center;justify-content:center;
    color:#fff;font-family:Georgia,serif;font-size:2.2rem;font-weight:700;
    position:relative;overflow:hidden;
  }
  .card .thumb .thumb-initials{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:0}
  .card .thumb img.thumb-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;z-index:1}
  .card .badge-incomplete{
    position:absolute;top:10px;right:10px;background:var(--terracotta);color:#fff;
    font-size:.7rem;padding:4px 10px;border-radius:999px;font-weight:600;z-index:2;
  }
  .fav-btn{
    position:absolute;top:10px;left:10px;z-index:3;
    width:44px;height:44px;border-radius:50%;
    background:rgba(255,255,255,.9);border:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 1px 4px rgba(0,0,0,.25);
    color:var(--fern-dark);transition:transform .12s;
  }
  .fav-btn:hover{transform:scale(1.1)}
  .fav-btn.active{color:var(--marigold)}
  .fav-btn svg{display:block}
  .card .body{padding:15px 17px 17px;flex:1;display:flex;flex-direction:column;gap:7px}
  .card h3{font-size:1.14rem;margin:0}
  .card .cat{
    text-transform:uppercase;letter-spacing:.06em;font-size:.7rem;
    color:var(--terracotta);font-weight:700;
  }
  .card .facts{display:flex;gap:14px;color:var(--ink-soft);font-size:.86rem;margin-top:auto}
  .card .tags{display:flex;flex-wrap:wrap;gap:6px}
  .tag{
    background:var(--cream);border:1px solid var(--border);color:var(--ink-soft);
    font-size:.74rem;padding:3px 10px;border-radius:999px;
  }
  .empty{
    text-align:center;padding:70px 20px;color:var(--ink-soft);
  }
  .empty .big{font-size:2.2rem;margin-bottom:10px;font-family:Georgia,serif;color:var(--fern-dark)}

  /* Detail view */
  .back-link{
    display:inline-flex;align-items:center;gap:6px;color:var(--fern-dark);
    text-decoration:none;font-weight:600;margin-bottom:18px;cursor:pointer;
  }
  .recipe-detail{
    background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    overflow:hidden;border:1px solid var(--border);
  }
  .recipe-detail .hero{
    height:300px;background:linear-gradient(135deg,var(--fern) 0%,var(--marigold) 100%);
    display:flex;align-items:flex-end;position:relative;
  }
  .recipe-detail .hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .recipe-detail .hero .overlay{
    position:relative;z-index:1;width:100%;
    background:linear-gradient(0deg, rgba(0,0,0,.55) 0%, rgba(0,0,0,0) 70%);
    padding:24px 30px;color:#fff;
  }
  .recipe-detail .hero h2{color:#fff;font-size:2.1rem;margin-bottom:0}
  .recipe-detail .hero .cat{color:#ffe9b8}
  .detail-title-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-top:4px}
  .fav-btn-detail{
    display:inline-flex;align-items:center;gap:8px;
    background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.6);
    color:#fff;padding:8px 18px;border-radius:999px;cursor:pointer;
    font-size:.88rem;font-family:inherit;font-weight:600;white-space:nowrap;
  }
  .fav-btn-detail:hover{background:rgba(255,255,255,.3)}
  .fav-btn-detail.active{background:var(--marigold);border-color:var(--marigold);color:#4a3200}
  .fav-btn-detail svg{display:block}
  .detail-body{padding:26px 30px 38px}
  .fact-row{display:flex;flex-wrap:wrap;gap:22px;margin:6px 0 22px;color:var(--ink-soft)}
  .fact{display:flex;flex-direction:column}
  .fact .label{font-size:.75rem;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft)}
  .fact .value{font-size:1.12rem;color:var(--ink);font-weight:600}
  .incomplete-banner{
    background:#fdecea;border:1px solid var(--terracotta);color:#7a2814;
    padding:14px 18px;border-radius:10px;margin-bottom:22px;font-size:.95rem;
  }
  .missing-box{
    background:#fdecea;border:1px dashed var(--terracotta);color:#7a2814;
    padding:16px 18px;border-radius:10px;font-size:.95rem;
  }
  .missing-info-box{
    background:#fff8ec;border:1px solid var(--marigold);color:#5c4108;
    padding:16px 18px;border-radius:10px;font-size:.95rem;margin-bottom:22px;
  }
  .missing-info-box h4{margin:0 0 8px;font-size:.95rem;color:#8a5a00}
  .missing-info-box ul{margin:0;padding-left:0;list-style:none}
  .missing-info-box li{padding:3px 0}
  .description{font-size:1.06rem;color:var(--ink);margin-bottom:26px}
  .description.description-na{color:var(--ink-soft);font-style:italic}

  /* Top-of-page info block: description at the very top, prep/cook/total/
     difficulty in a compact stat box that sits in the top-left corner. */
  .top-info{display:flex;gap:26px;flex-wrap:wrap;margin-bottom:8px}
  .stat-box{
    flex:0 0 210px;display:flex;flex-direction:column;gap:11px;
    background:var(--cream);border:1px solid var(--border);border-radius:12px;
    padding:16px 20px;
  }
  .stat-box .fact{flex-direction:row;justify-content:space-between;align-items:center;gap:10px}
  .stat-box .fact .label{white-space:nowrap}
  .stat-box .fact .value{font-size:1rem}
  .top-info .description-wrap{flex:1 1 320px;min-width:240px}
  .top-info .description{margin-bottom:0}

  .difficulty-meter{display:inline-flex;align-items:center;gap:7px}
  .difficulty-meter .bars{display:flex;align-items:flex-end;gap:3px}
  .difficulty-meter .bar{width:6px;border-radius:2px;background:var(--border)}
  .difficulty-meter .bar.b1{height:8px}
  .difficulty-meter .bar.b2{height:13px}
  .difficulty-meter .bar.b3{height:18px}
  .difficulty-meter .bar.filled.level-1{background:var(--fern)}
  .difficulty-meter .bar.filled.level-2{background:var(--marigold)}
  .difficulty-meter .bar.filled.level-3{background:var(--terracotta)}
  .difficulty-meter .diff-text{font-size:.95rem;font-weight:600;color:var(--ink)}

  .source-line{font-size:.94rem;color:var(--ink-soft);margin-bottom:22px}
  .source-line a{font-weight:600}

  .photo-fallback-tag{
    position:absolute;left:0;right:0;bottom:0;z-index:2;
    background:rgba(47,42,34,.62);color:#fff;font-size:.68rem;
    padding:4px 10px;letter-spacing:.02em;
  }
  .recipe-detail .hero .photo-fallback-tag{font-size:.78rem;padding:6px 14px}

  .regen-box{
    margin-top:8px;background:var(--cream);border:1px solid var(--border);
    border-radius:12px;padding:18px 20px;
  }
  .regen-box h4{margin:0 0 8px;font-size:1rem;color:var(--fern-dark)}
  .regen-box p{margin:0 0 12px;font-size:.92rem;color:var(--ink-soft)}
  .regen-actions{display:flex;flex-wrap:wrap;gap:10px}
  .regen-actions a, .regen-actions button{
    font-family:inherit;font-size:.9rem;font-weight:600;
    padding:9px 18px;border-radius:999px;cursor:pointer;text-decoration:none;
    display:inline-flex;align-items:center;gap:6px;
  }
  .regen-actions a{background:#fff;border:1px solid var(--border);color:var(--fern-dark)}
  .regen-actions button{background:var(--fern);color:#fff;border:none}
  .regen-actions button:hover{background:var(--fern-dark)}

  .section{margin-bottom:30px}
  .section h3{font-size:1.35rem;border-bottom:2px solid var(--border);padding-bottom:8px;margin-bottom:16px}
  .servings-control{
    display:flex;align-items:center;gap:12px;margin-bottom:16px;
    background:var(--cream);border-radius:10px;padding:10px 16px;width:fit-content;
  }
  .servings-control button{
    width:44px;height:44px;border-radius:50%;border:1px solid var(--border);
    background:#fff;font-size:1.1rem;cursor:pointer;color:var(--fern-dark);font-weight:700;
  }
  .servings-control button:hover{background:var(--fern);color:#fff}
  .servings-control .count{font-weight:700;font-size:1.1rem;min-width:90px;text-align:center}
  .add-to-list-btn{
    display:inline-block;margin-bottom:14px;background:var(--marigold);color:#4a3200;
    border:none;padding:12px 20px;border-radius:999px;cursor:pointer;font-size:.9rem;font-weight:700;
  }
  .add-to-list-btn:hover{background:#e8951a}

  /* Ingredient list: grid-aligned quantity / secondary-quantity / name columns */
  ul.ingredients{list-style:none;padding:0;margin:0}
  ul.ingredients li{
    display:grid;grid-template-columns:92px 140px 1fr;column-gap:12px;align-items:baseline;
    padding:9px 0;border-bottom:1px solid var(--border);font-size:1.02rem;
  }
  ul.ingredients li:last-child{border-bottom:none}
  ul.ingredients li .qty{font-weight:700;color:var(--fern-dark);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  ul.ingredients li .qty-secondary{color:var(--ink-soft);font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  ul.ingredients li .ing-name{min-width:0}

  ol.steps{padding-left:0;list-style:none;counter-reset:step}
  ol.steps li{
    counter-increment:step;position:relative;padding:10px 0 10px 46px;
    margin-bottom:6px;font-size:1.04rem;
  }
  ol.steps li::before{
    content:counter(step);position:absolute;left:0;top:8px;
    width:32px;height:32px;border-radius:50%;background:var(--fern);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.95rem;
  }
  .notes-box{
    background:var(--cream);border-left:4px solid var(--marigold);
    padding:14px 18px;border-radius:8px;font-size:1rem;white-space:pre-wrap;
  }
  .source-box{
    background:var(--cream);border-radius:10px;padding:16px 20px;font-size:.94rem;color:var(--ink-soft);
  }
  .diet-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  footer{text-align:center;color:var(--ink-soft);font-size:.85rem;padding:30px 0}

  /* Shopping list view */
  .list-toolbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:18px}
  .list-toolbar button{
    background:var(--fern);color:#fff;border:none;padding:12px 20px;border-radius:999px;
    cursor:pointer;font-size:.92rem;font-weight:600;
  }
  .list-toolbar button.secondary{background:#fff;color:var(--fern-dark);border:1px solid var(--border)}
  .list-toolbar button.danger{background:#fff;color:var(--terracotta);border:1px solid var(--terracotta)}
  .groupby-toggle{display:inline-flex;border:1px solid var(--border);border-radius:999px;overflow:hidden}
  .groupby-toggle button{
    background:#fff;color:var(--fern-dark);border:none;padding:12px 18px;cursor:pointer;
    font-size:.92rem;font-weight:600;border-radius:0;
  }
  .groupby-toggle button.active{background:var(--fern);color:#fff}
  .groupby-toggle button + button{border-left:1px solid var(--border)}
  .list-note{color:var(--ink-soft);font-size:.88rem;margin-bottom:20px;max-width:70ch}
  .shop-group{
    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    box-shadow:var(--shadow);padding:20px 24px;margin-bottom:20px;
  }
  .shop-group-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;gap:10px;flex-wrap:wrap}
  .shop-group-head h3{margin:0;font-size:1.2rem;border:none;padding:0}
  .shop-group-head .remove-link{color:var(--terracotta);font-size:.85rem;cursor:pointer;font-weight:600;white-space:nowrap}
  .aisle-group-head .aisle-count{color:var(--ink-soft);font-size:.85rem;font-weight:400;white-space:nowrap}
  ul.shopping-items{list-style:none;padding:0;margin:0}
  ul.shopping-items li{
    display:grid;grid-template-columns:26px 92px 140px 1fr;column-gap:12px;align-items:baseline;
    padding:8px 0;border-bottom:1px solid var(--border);font-size:1rem;
  }
  ul.shopping-items li:last-child{border-bottom:none}
  ul.shopping-items li .qty{font-weight:700;color:var(--fern-dark);text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  ul.shopping-items li .qty-secondary{color:var(--ink-soft);font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  ul.shopping-items li.checked .ing-name,
  ul.shopping-items li.checked .qty,
  ul.shopping-items li.checked .qty-secondary{text-decoration:line-through;color:var(--ink-soft);opacity:.6}
  ul.shopping-items input[type="checkbox"]{width:18px;height:18px;cursor:pointer}
  /* Small recipe-source tag under an ingredient's name in the "By Aisle" view,
     so items stay traceable to their recipe even without a per-recipe card. */
  .item-source{display:block;color:var(--ink-soft);font-size:.78rem;font-weight:400;margin-top:2px}
  ul.shopping-items li.checked .item-source{text-decoration:none;opacity:.6}
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
    background:var(--fern-dark);color:#fff;padding:10px 22px;border-radius:999px;
    font-size:.92rem;box-shadow:var(--shadow-lg);z-index:999;opacity:0;pointer-events:none;
    transition:opacity .2s;
  }
  .toast.show{opacity:1}

  /* Print-only flat shopping list: built by JS as a completely separate,
     minimal DOM block (no sidebar, no per-recipe cards/headings, no
     toolbar) so printing/PDF-export can never inherit the on-screen
     grouped layout, regardless of any other print rule below. Hidden
     on screen at all times; only shown for print, and only while the
     shopping-list route is actually active (see body.route-shopping-list
     below) so it never bleeds into printing a recipe page instead. */
  .print-only-list{display:none}
  .print-only-list h2{margin:0 0 14px;font-size:1.4rem}
  .print-only-list ul{list-style:none;margin:0;padding:0}
  .print-only-list li{display:flex;gap:12px;align-items:baseline;padding:6px 0;border-bottom:1px solid #ccc;font-size:1rem;break-inside:avoid}
  .print-only-list .pqty{font-weight:700;white-space:nowrap;min-width:88px}
  .print-only-list .pqty2{color:#555;font-size:.85rem;white-space:nowrap;min-width:100px}
  .print-only-list .psource{color:#666;font-size:.85rem}
  /* Plain-text section label above a group of items - no box, no button, no
     link. Used both for a recipe name ("By Recipe" mode) and an aisle name
     ("By Aisle" mode, the default) - either way it's just enough to keep
     every item below it identifiable/traceable. */
  .print-only-list li.precipe{
    display:block;border-bottom:none;font-weight:700;font-size:1.05rem;
    margin-top:16px;padding:0 0 4px;break-inside:avoid;break-after:avoid;
  }
  .print-only-list li.precipe:first-of-type{margin-top:4px}

  @media print{
    /* !important on every one of these: Chrome (and other browsers) evaluate
       the @media (max-width:860px) mobile layout rules below using the
       print page's rendered width, which for a portrait US Letter/A4 page
       is narrower than 860px - so without !important here, that later
       mobile rule (.sidebar{display:flex;...}) was winning the cascade and
       re-showing the sidebar as a vertical list of category pills during
       print/PDF export, even though this print rule "set" display:none. */
    header.site, .back-link, .servings-control button, .sidebar, .list-toolbar, .remove-link, .add-to-list-btn, .fav-btn, .fav-btn-detail, .regen-box{display:none !important}
    .layout{display:block !important}
    body.route-shopping-list #shoppingListView{display:none !important}
    body.route-shopping-list .print-only-list{display:block !important}
  }
  /* ---- Bottom navigation (phone/tablet only - hidden on desktop where the
     sidebar handles categories). NOTE: this base rule (display:none) must
     appear BEFORE the @media (max-width:860px) block below, since CSS
     resolves equal-specificity conflicts by source order regardless of
     which one is inside a media query - defining it after the media query
     silently wins and hides the bar at every width. Keep it above. ---- */
  .bottom-nav{
    display:none;position:fixed;left:0;right:0;bottom:0;z-index:50;
    background:#fff;border-top:1px solid var(--border);
    box-shadow:0 -2px 10px rgba(47,42,34,.10);
  }
  .bn-item{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    background:none;border:none;color:var(--ink-soft);font-family:inherit;
    padding:8px 4px calc(8px + env(safe-area-inset-bottom,0px));
    min-height:56px;cursor:pointer;position:relative;font-size:.7rem;
  }
  .bn-item svg{display:block}
  .bn-item.active{color:var(--fern-dark)}
  .bn-item .bn-badge{
    position:absolute;top:0;right:calc(50% - 24px);
    background:var(--marigold);color:#4a3200;font-weight:700;font-size:.65rem;
    border-radius:999px;padding:0 6px;line-height:1.5;
  }

  /* ---- Category bottom sheet (mobile "Categories" tab target) ---- */
  .sheet-backdrop{display:none;position:fixed;inset:0;background:rgba(47,42,34,.4);z-index:60}
  .sheet-backdrop.open{display:block}
  .category-sheet{
    position:fixed;left:0;right:0;bottom:0;z-index:61;
    background:var(--card);border-radius:20px 20px 0 0;box-shadow:var(--shadow-lg);
    max-height:70vh;overflow-y:auto;
    transform:translateY(100%);transition:transform .22s ease-out;
    padding:10px 6px calc(20px + env(safe-area-inset-bottom,0px));
  }
  .category-sheet.open{transform:translateY(0)}
  .sheet-handle{width:40px;height:4px;background:var(--border);border-radius:99px;margin:4px auto 10px}
  .sheet-header{display:flex;align-items:center;justify-content:space-between;padding:0 14px 8px;border-bottom:1px solid var(--border);margin-bottom:6px}
  .sheet-header h4{margin:0;font-size:1.05rem}
  .sheet-close{background:none;border:none;font-size:1.7rem;line-height:1;color:var(--ink-soft);cursor:pointer;padding:4px 10px}
  .category-sheet .nav-item{padding:13px 18px;border-radius:10px;margin:0 8px}

  /* ---- Cooking Mode: bigger text + one-step-at-a-time on the recipe page ---- */
  .cook-mode-btn{
    display:inline-flex;align-items:center;gap:8px;
    background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.6);
    color:#fff;padding:8px 18px;border-radius:999px;cursor:pointer;
    font-size:.88rem;font-family:inherit;font-weight:600;white-space:nowrap;
  }
  .cook-mode-btn:hover{background:rgba(255,255,255,.3)}
  .cook-mode-btn.active{background:var(--marigold);border-color:var(--marigold);color:#4a3200}

  body.cooking-mode ul.ingredients li{font-size:1.2rem;padding:12px 0}
  body.cooking-mode .description{font-size:1.16rem}

  .step-nav{
    display:none;align-items:center;justify-content:space-between;gap:14px;
    background:var(--cream);border-radius:12px;padding:10px 14px;margin-bottom:16px;
  }
  .step-nav button{
    background:var(--fern);color:#fff;border:none;border-radius:999px;
    padding:12px 20px;font-size:1rem;font-weight:700;cursor:pointer;min-height:44px;
  }
  .step-nav button:disabled{opacity:.4;cursor:default}
  .step-nav .step-indicator{font-weight:700;color:var(--fern-dark)}

  ol.steps.step-mode li{display:none}
  ol.steps.step-mode li.step-active{
    display:block;background:var(--cream);border-radius:12px;
    padding:20px 20px 20px 62px;font-size:1.28rem;line-height:1.55;
  }
  ol.steps.step-mode li.step-active::before{display:none}

  @media (max-width:860px){
    :root{font-size:16px}
    .layout{flex-direction:column}
    /* The old wrapped-pill category row is replaced on mobile by the fixed
       bottom nav's "Categories" tab (opens .category-sheet) - see above. */
    .sidebar{display:none}
    body{padding-bottom:calc(64px + env(safe-area-inset-bottom,0px))}
    .bottom-nav{display:flex}
    header.site{padding:14px 0}
    header.site .meta{display:none}
    header.site h1{font-size:1.32rem}
    header.site .header-row{gap:10px}
    .searchbar{width:100%;max-width:none}
    .shopping-btn{display:none} /* moved into the bottom nav's Shopping tab */
    .recipe-detail .hero{height:220px}
    .recipe-detail .hero h2{font-size:1.6rem}
    .detail-body{padding:20px}

    /* Ingredient / shopping-list rows: stack the primary and secondary
       quantity on top of each other in a narrow first column so the
       ingredient name gets the rest of the (narrow) screen width instead
       of being squeezed by three fixed-px columns. */
    ul.ingredients li{
      grid-template-columns:74px 1fr;grid-template-rows:auto auto;row-gap:2px;
    }
    ul.ingredients li .qty{grid-column:1;grid-row:1}
    ul.ingredients li .qty-secondary{grid-column:1;grid-row:2}
    ul.ingredients li .ing-name{grid-column:2;grid-row:1 / span 2;align-self:center}

    ul.shopping-items li{
      grid-template-columns:26px 74px 1fr;grid-template-rows:auto auto;row-gap:2px;
    }
    ul.shopping-items li input[type="checkbox"]{grid-column:1;grid-row:1 / span 2;align-self:center}
    ul.shopping-items li .qty{grid-column:2;grid-row:1}
    ul.shopping-items li .qty-secondary{grid-column:2;grid-row:2}
    ul.shopping-items li .ing-name{grid-column:3;grid-row:1 / span 2;align-self:center}
  }

function classifyAisle(name){
  const n = " " + (name||"").toLowerCase() + " ";
  for(const [phrase, aisle] of AISLE_KEYWORDS){
    if(!aisle) continue;
    if(n.includes(phrase.toLowerCase())) return aisle;
  }
  return "Other";
}

// ---- favorites state (persisted to localStorage where available) ----
const FAVORITES_KEY = "cookbook_favorites_v1";

function loadFavorites(){
  try{
    const raw = localStorage.getItem(FAVORITES_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch(e){ return {}; }

const COOKING_MODE_KEY = "cookbook_cooking_mode_v1";
function loadCookingMode(){
  try{ return localStorage.getItem(COOKING_MODE_KEY) === "1"; } catch(e){ return false; }
}
function saveCookingMode(){
  try{ localStorage.setItem(COOKING_MODE_KEY, cookingMode ? "1" : "0"); } catch(e){ /* session-only fallback */ }
}
let cookingMode = loadCookingMode();
let wakeLock = null;

async function requestWakeLock(){
  try{
    if("wakeLock" in navigator){ wakeLock = await navigator.wakeLock.request("screen"); }
  } catch(e){ /* not supported, denied, or backgrounded - Cooking Mode still works, screen just may sleep as usual */ }
}
function releaseWakeLock(){
  if(wakeLock){ wakeLock.release().catch(()=>{}); wakeLock = null; }
}
// The Wake Lock API auto-releases when the tab becomes hidden (switching
// apps, locking manually) - re-acquire it when the tab is visible again if
// Cooking Mode is still on, so it doesn't silently stop working.
document.addEventListener("visibilitychange", ()=>{
  if(cookingMode && document.visibilityState === "visible") requestWakeLock();
});

let currentStep = {}; // slug -> index of the currently focused instruction step (Cooking Mode only)

function categoryLabel(c){
  return c.replace(/-/g," ").replace(/\b\w/g, m => m.toUpperCase());
}

function matchesSearch(r, term){
  if(!term) return true;
  const hay = [
    r.title, r.category, r.cuisine || "",
    (r.tags||[]).join(" "), (r.diet||[]).join(" "),
    (r.ingredients||[]).map(i=>i.text||i.raw).join(" ")
  ].join(" ").toLowerCase();
  return hay.includes(term.toLowerCase());
}

// A category click (from the sidebar, the mobile sheet, or a bottom-nav
// tab) always opens that category's recipes, even if a search keyword is
// currently typed in - clear the search so it can't hide recipes that
// belong to the clicked category. Single source of truth so the sidebar,
// the mobile category sheet, and the bottom nav's Browse/Favorites tabs
// can never fall out of sync with each other.
function goToCategory(cat){
  activeCategory = cat;
  searchTerm = "";
  const searchBox = document.getElementById("searchInput");
  if(searchBox) searchBox.value = "";
  if(location.hash){ location.hash = ""; } // return to the browse grid if a recipe detail page was open
  renderSidebar();
  renderGrid();
  route();
  window.scrollTo(0,0);
}

function wireNavItems(container, closeSheetAfter){
  container.querySelectorAll(".nav-item").forEach(item=>{
    item.addEventListener("click", ()=>{
      goToCategory(item.dataset.cat);
      if(closeSheetAfter) closeCategorySheet();
    });
  });
}

function renderSidebar(){
  const counts = {};
  RECIPES.forEach(r => { counts[r.category] = (counts[r.category]||0) + 1; });
  const favCount = RECIPES.filter(r => isFavorite(r.slug)).length;
  const items = [
    ["all","All Recipes",RECIPES.length],
    ["__favorites__","★ Favorites",favCount],
    ...CATEGORIES.map(c => [c, categoryLabel(c), counts[c]||0])
  ];
  const itemsHtml = items.map(([key,label,count]) => `
    <div class="nav-item ${key===activeCategory?"active":""}" data-cat="${key}">
      <span>${label}</span><span class="count">${count}</span>
    </div>
  `).join("");

  const wrap = document.getElementById("categoryNav");
  wrap.innerHTML = itemsHtml;
  wireNavItems(wrap, false);

  // Mirrors the same category list into the mobile bottom sheet (see
  // .category-sheet in the CSS) - same data, same click behavior, plus it
  // closes the sheet after a selection.
  const sheetWrap = document.getElementById("categoryNavSheet");
  if(sheetWrap){
    sheetWrap.innerHTML = itemsHtml;
    wireNavItems(sheetWrap, true);
  }

  updateBottomNavActive();
}

function photoFallbackTag(r){
  if(!r.image_is_fallback) return "";
  const label = r.image_fallback_title ? `Photo from a similar recipe: ${r.image_fallback_title}` : "Photo of a similar recipe";
  return `<span class="photo-fallback-tag" title="This recipe doesn't have its own verified photo yet, so it's showing a photo borrowed from a related recipe in the cookbook.">${label}</span>`;
}

function thumbHtml(r){
  const badge = r.incomplete ? '<span class="badge-incomplete">Needs source</span>' : '';
  const initials = r.title.split(" ").map(w=>w[0]).slice(0,2).join("");
  const fav = isFavorite(r.slug);
  const favBtn = `<button class="fav-btn${fav?" active":""}" data-slug="${r.slug}" type="button" title="${fav?"Remove from favorites":"Add to favorites"}">${starSvg(fav)}</button>`;
  const imgTag = r.image ? `<img class="thumb-img" src="${r.image}" alt="${r.title}" referrerpolicy="no-referrer" loading="lazy" onerror="this.remove()">` : "";
  return `<div class="thumb">${badge}${favBtn}<span class="thumb-initials">${initials}</span>${imgTag}${photoFallbackTag(r)}</div>`;
}

function renderGrid(){
  const grid = document.getElementById("recipeGrid");
  const filtered = RECIPES.filter(r =>
    (activeCategory==="all" || (activeCategory==="__favorites__" ? isFavorite(r.slug) : r.category===activeCategory)) && matchesSearch(r, searchTerm)
  );
  const emptyState = document.getElementById("emptyState");
  emptyState.style.display = filtered.length ? "none" : "block";
  if(!filtered.length){
    emptyState.innerHTML = activeCategory === "__favorites__"
      ? `<div class="big">No favorites yet</div><div>Click the star on any recipe card (or on a recipe's page) to add it here.</div>`
      : `<div class="big">No matches</div><div>No recipes match that search yet.</div>`;
  }
  grid.innerHTML = filtered.map(r => `
    <div class="card" data-slug="${r.slug}">
      ${thumbHtml(r)}
      <div class="body">
        <div class="cat">${categoryLabel(r.category)}</div>
        <h3>${r.title}</h3>
        <div class="tags">${(r.tags||[]).filter(t=>t!=="UNVERIFIED").slice(0,3).map(t=>`<span class="tag">${t}</span>`).join("")}</div>
        <div class="facts">
          ${r.total_time_minutes ? `<span>${r.total_time_minutes} min</span>` : ""}
          ${r.servings ? `<span>${r.servings} servings</span>` : ""}
        </div>
      </div>
    </div>
  `).join("");
  grid.querySelectorAll(".card").forEach(card=>{
    card.addEventListener("click", ()=> location.hash = "#recipe/" + card.dataset.slug);
  });
  grid.querySelectorAll(".fav-btn").forEach(btn=>{
    btn.addEventListener("click", (e)=>{
      e.stopPropagation();
      toggleFavorite(btn.dataset.slug);
      renderGrid();
    });
  });
}

function renderMissingInfo(text){
  if(!text) return "";
  const items = text.split("\n").map(l=>l.trim()).filter(Boolean).map(l=>l.replace(/^-\s*\[.\]\s*/,"").replace(/^-\s*/,""));
  return `<div class="missing-info-box"><h4>Still needed for this recipe — paste it in the chat to complete:</h4><ul>${items.map(i=>`<li>☐ ${i}</li>`).join("")}</ul></div>`;
}

// ---- top-of-page facts: prep/cook/total always show a value or "N.A.",
// difficulty renders as a three-level icon (Easy/Moderate/Hard) or "N.A." ----
function factString(v){
  return (v===null || v===undefined) ? "N.A." : `${v} min`;
}

function difficultyMeterHtml(r){
  const level = r.difficulty_level;
  const label = r.difficulty_label;
  if(!level){
    return `<span class="difficulty-meter"><span class="diff-text">${label || "N.A."}</span></span>`;
  }
  const bars = [1,2,3].map(n => `<span class="bar b${n}${n<=level?` filled level-${level}`:""}"></span>`).join("");
  return `<span class="difficulty-meter" title="Difficulty: ${label}"><span class="bars">${bars}</span><span class="diff-text">${label}</span></span>`;
}

// The source URL sits right below the description and must always be a
// clickable link when one is on file; otherwise it says so plainly (N.A.).
function sourceLineHtml(r){
  if(!r.source_url) return "Source: N.A. (not recorded).";
  return `Source: <a href="${r.source_url}" target="_blank" rel="noopener">${r.source_title||r.source_url}</a>${r.source_author?` by ${r.source_author}`:""}`;
}

// Prompt text for the "copy a prompt" button at the bottom of a recipe -
// paste-ready for chat, matching the trigger phrasing in
// _cookbook-meta-prompt.md §6b (completing a partial recipe) or a general
// correction if the recipe is already complete.
function regenPromptText(r){
  if(r.incomplete){
    return `Here's the missing info for ${r.md_path} ("${r.title}"): [paste your details here]`;
  }
  return `Please update ${r.md_path} ("${r.title}") with this correction: [describe the change]`;
}

// ---- fraction formatting for scaled quantities ----
function formatQty(v){
  if(v===null || v===undefined) return "";
  const whole = Math.floor(v);
  const frac = v - whole;
  const fractions = [[0.125,"1/8"],[0.25,"1/4"],[0.333,"1/3"],[0.5,"1/2"],[0.667,"2/3"],[0.75,"3/4"]];
  let best = null, bestDiff = 999;
  for(const [val,label] of fractions){
    const d = Math.abs(frac-val);
    if(d < bestDiff){ bestDiff = d; best = label; }
  }
  if(frac < 0.06) return whole===0 ? "0" : String(whole);
  if(bestDiff < 0.06){
    return whole>0 ? `${whole} ${best}` : best;
  }
  return (Math.round(v*100)/100).toString();
}

const PLURALIZABLE_UNITS = ["tablespoon","teaspoon","cup","pound","clove","slice","pinch","dash","can","fillet","sprig","bunch","ounce"];
function pluralizeUnit(unit, scaledValue){
  if(!unit) return unit;
  const isPlural = scaledValue > 1.06;
  const base = unit.replace(/s$/,"");
  if(!PLURALIZABLE_UNITS.includes(base)) return unit; // abbreviations (tbsp, tsp, oz, g, kg, ml, l...) don't inflect
  return isPlural ? base + "s" : base;
}

// Single source of truth for the quantity math, shared by the recipe-detail
// ingredient list and the shopping-list view so the two can never diverge.
function computeQtyStrings(ing, factor){
  if(ing.qty===null) return { primaryStr:"-", secondaryStr:"" };

  let primaryStr;
  if(ing.metric_qty !== null && ing.metric_unit){
    const scaledMetric = ing.metric_qty * factor;
    const displayVal = scaledMetric < 10 ? Math.round(scaledMetric*10)/10 : Math.round(scaledMetric);
    primaryStr = `${displayVal} ${ing.metric_unit}`;
  } else {
    const scaled = ing.qty * factor;
    const unit = pluralizeUnit(ing.unit, scaled);
    primaryStr = `${formatQty(scaled)}${unit ? " "+unit : ""}`;
  }

  let secondaryStr = "";
  if(ing.us_qty !== null && ing.us_unit){
    const scaledUs = ing.us_qty * factor;
    const usUnit = pluralizeUnit(ing.us_unit, scaledUs);
    secondaryStr = `(${formatQty(scaledUs)}${usUnit ? " "+usUnit : ""})`;
  }
  return { primaryStr, secondaryStr };
}

function ingredientLine(ing, factor){
  const name = ing.qty===null ? ing.raw : ing.text;
  const { primaryStr, secondaryStr } = computeQtyStrings(ing, factor);
  return `<li><span class="qty">${primaryStr}</span><span class="qty-secondary">${secondaryStr}</span><span class="ing-name">${name}</span></li>`;
}

function shoppingItemLine(ing, factor, slug, idx, checked){
  const name = ing.qty===null ? ing.raw : ing.text;
  const { primaryStr, secondaryStr } = computeQtyStrings(ing, factor);
  return `<li class="${checked?"checked":""}"><input type="checkbox" data-slug="${slug}" data-idx="${idx}" ${checked?"checked":""}><span class="qty">${primaryStr}</span><span class="qty-secondary">${secondaryStr}</span><span class="ing-name">${name}</span></li>`;
}

// ---- shopping list actions ----
function updateShoppingBadge(){
  const count = Object.keys(shoppingList).length;
  const badge = document.getElementById("shoppingBadge");
  if(badge){
    badge.textContent = String(count);
    badge.style.display = count ? "inline-block" : "none";
  }
  const bnBadge = document.getElementById("bnShoppingBadge");
  if(bnBadge){
    bnBadge.textContent = String(count);
    bnBadge.style.display = count ? "inline-block" : "none";
  }
}

// ---- mobile bottom nav + category sheet ----
function openCategorySheet(){
  document.getElementById("categorySheet").classList.add("open");
  document.getElementById("categorySheetBackdrop").classList.add("open");
}
function closeCategorySheet(){
  document.getElementById("categorySheet").classList.remove("open");
  document.getElementById("categorySheetBackdrop").classList.remove("open");
}
function updateBottomNavActive(){
  const hash = location.hash;
  const onShopping = hash === "#shopping-list";
  const onFavorites = !onShopping && !hash.startsWith("#recipe/") && activeCategory === "__favorites__";
  const bnShopping = document.getElementById("bnShopping");
  const bnFavorites = document.getElementById("bnFavorites");
  const bnBrowse = document.getElementById("bnBrowse");
  if(bnShopping) bnShopping.classList.toggle("active", onShopping);
  if(bnFavorites) bnFavorites.classList.toggle("active", onFavorites);
  if(bnBrowse) bnBrowse.classList.toggle("active", !onShopping && !onFavorites);
}

function showToast(msg){
  let el = document.getElementById("toast");
  if(!el){
    el = document.createElement("div");
    el.id = "toast";
    el.className = "toast";
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=> el.classList.remove("show"), 2200);
}

function addRecipeToShoppingList(slug, servings){
  shoppingList[slug] = { servings: servings || null, checked: (shoppingList[slug] && shoppingList[slug].checked) || {} };
  saveShoppingList();
  updateShoppingBadge();
  showToast("Added to shopping list");
}

function removeRecipeFromShoppingList(slug){
  delete shoppingList[slug];
  saveShoppingList();
  updateShoppingBadge();
  if(location.hash === "#shopping-list") renderShoppingList();
}

function toggleShoppingItem(slug, idx){
  if(!shoppingList[slug]) return;
  shoppingList[slug].checked[idx] = !shoppingList[slug].checked[idx];
  saveShoppingList();
}

function clearShoppingList(){
  shoppingList = {};
  saveShoppingList();
  updateShoppingBadge();
  renderShoppingList();
}

// Flattens the shopping list into one array of individual ingredient
// entries - never merges quantities across recipes (each entry keeps its
// own slug/index so checkboxes and traceability work exactly as before).
// Shared by the "By Aisle" on-screen view, the print-only view, and the
// "Copy to clipboard" text, so aisle classification only happens in one
// place.
function buildFlatShoppingItems(slugs){
  const out = [];
  slugs.forEach(slug=>{
    const r = RECIPES.find(x=>x.slug===slug);
    if(!r) return;
    const entry = shoppingList[slug];
    const factor = (r.servings && entry.servings) ? (entry.servings / r.servings) : 1;
    (r.ingredients||[]).forEach((ing, idx)=>{
      const name = ing.qty===null ? ing.raw : ing.text;
      const { primaryStr, secondaryStr } = computeQtyStrings(ing, factor);
      out.push({
        slug, idx, checked: !!entry.checked[idx],
        recipeTitle: r.title,
        servingsLabel: entry.servings ? `${entry.servings} servings` : "",
        name, primaryStr, secondaryStr,
        aisle: classifyAisle(name),
      });
    });
  });
  return out;
}

// Groups a flat item array by aisle, in AISLE_ORDER, dropping empty aisles.
function groupItemsByAisle(items){
  const bySection = {};
  items.forEach(it=>{ (bySection[it.aisle] = bySection[it.aisle] || []).push(it); });
  return AISLE_ORDER.filter(a => bySection[a] && bySection[a].length).map(a => [a, bySection[a]]);
}

function aisleItemLine(it){
  const sourceTag = `<span class="item-source">${it.recipeTitle}${it.servingsLabel ? ` (${it.servingsLabel})` : ""}</span>`;
  return `<li class="${it.checked?"checked":""}"><input type="checkbox" data-slug="${it.slug}" data-idx="${it.idx}" ${it.checked?"checked":""}><span class="qty">${it.primaryStr}</span><span class="qty-secondary">${it.secondaryStr}</span><span class="ing-name">${it.name}${sourceTag}</span></li>`;
}

function shoppingListPlainText(){
  const slugs = Object.keys(shoppingList);
  if(!slugs.length) return "Shopping list is empty.";
  // Flat, single checklist (no card boxes, no sidebar/toolbar) that pastes
  // cleanly into Word, Notes, or any plain-text app - grouped the same way
  // the on-screen view currently is (by aisle, the default, or by recipe),
  // with a plain-text label above each group so every item's source/section
  // stays identifiable. Quantities are still never merged across recipes.
  const items = buildFlatShoppingItems(slugs);
  const lines = [`Shopping List - generated ${new Date().toISOString().slice(0,10)}`, ""];
  if(groupBy === "aisle"){
    groupItemsByAisle(items).forEach(([aisle, its])=>{
      lines.push(aisle);
      its.forEach(it=> lines.push(`- ${it.primaryStr}${it.secondaryStr?" "+it.secondaryStr:""} ${it.name} (${it.recipeTitle})`));
      lines.push("");
    });
  } else {
    slugs.forEach(slug=>{
      const its = items.filter(it=>it.slug===slug);
      if(!its.length) return;
      lines.push(`${its[0].recipeTitle}${its[0].servingsLabel ? ` (${its[0].servingsLabel})` : ""}`);
      its.forEach(it=> lines.push(`- ${it.primaryStr}${it.secondaryStr?" "+it.secondaryStr:""} ${it.name}`));
      lines.push("");
    });
  }
  return lines.join("\n").trim();
}

// Builds the completely separate, flat, print-only version of the list
// (no sidebar, no header, no toolbar, no card boxes) - shown only via
// @media print while the shopping-list route is active (see
// body.route-shopping-list in the CSS). Groups match whatever the
// on-screen view is currently showing (aisle or recipe), each with a plain
// text label (no box, no "Remove recipe" link, no button) directly above
// its items so every ingredient's source/section stays identifiable.
function renderShoppingListPrintView(slugs){
  const printView = document.getElementById("shoppingListPrintView");
  if(!printView) return;
  if(!slugs.length){ printView.innerHTML = ""; return; }
  const items = buildFlatShoppingItems(slugs);
  let bodyHtml;
  if(groupBy === "aisle"){
    bodyHtml = groupItemsByAisle(items).map(([aisle, its])=>{
      const lis = its.map(it=>`<li>&#9744; <span class="pqty">${it.primaryStr}</span><span class="pqty2">${it.secondaryStr}</span><span>${it.name} <span class="psource">(${it.recipeTitle})</span></span></li>`).join("");
      return `<li class="precipe">${aisle}</li>${lis}`;
    }).join("");
  } else {
    bodyHtml = slugs.map(slug=>{
      const its = items.filter(it=>it.slug===slug);
      if(!its.length) return "";
      const label = its[0].servingsLabel ? ` (${its[0].servingsLabel})` : "";
      const lis = its.map(it=>`<li>&#9744; <span class="pqty">${it.primaryStr}</span><span class="pqty2">${it.secondaryStr}</span><span>${it.name}</span></li>`).join("");
      return `<li class="precipe">${its[0].recipeTitle}${label}</li>${lis}`;
    }).join("");
  }
  printView.innerHTML = `<h2>Shopping List</h2><ul>${bodyHtml}</ul>`;
}

function renderShoppingList(){
  const view = document.getElementById("shoppingListView");
  const slugs = Object.keys(shoppingList);
  renderShoppingListPrintView(slugs);
  if(!slugs.length){
    view.innerHTML = `
      <div class="empty">
        <div class="big">Your shopping list is empty</div>
        <div>Open a recipe and click "+ Add to Shopping List" to build one.</div>
      </div>`;
    return;
  }

  let bodyHtml, noteHtml;
  if(groupBy === "aisle"){
    const items = buildFlatShoppingItems(slugs);
    bodyHtml = groupItemsByAisle(items).map(([aisle, its])=> `
      <div class="shop-group aisle-group">
        <div class="shop-group-head aisle-group-head">
          <h3>${aisle}</h3><span class="aisle-count">${its.length} item${its.length===1?"":"s"}</span>
        </div>
        <ul class="shopping-items">${its.map(aisleItemLine).join("")}</ul>
      </div>`).join("");
    noteHtml = `Grouped by grocery-store section (produce, meat &amp; seafood, dairy, pantry, and so on) so you can shop each section once - whether that's walking the store in one pass or adding items to an online cart in order. Sections are assigned by a simple keyword match, not a guaranteed lookup, so double-check anything that lands somewhere unexpected. Every item still shows the recipe it came from, and quantities are never merged across recipes. Switch to "By Recipe" for the traditional grouped view.`;
  } else {
    bodyHtml = slugs.map(slug=>{
      const r = RECIPES.find(x=>x.slug===slug);
      if(!r) return "";
      const entry = shoppingList[slug];
      const factor = (r.servings && entry.servings) ? (entry.servings / r.servings) : 1;
      const items = (r.ingredients||[]).map((ing,idx)=> shoppingItemLine(ing, factor, slug, idx, !!entry.checked[idx])).join("");
      return `
        <div class="shop-group">
          <div class="shop-group-head">
            <h3>${r.title}${entry.servings ? ` <span style="color:var(--ink-soft);font-weight:400;font-size:.85rem">(${entry.servings} servings)</span>` : ""}</h3>
            <span class="remove-link" data-remove="${slug}">Remove recipe</span>
          </div>
          <ul class="shopping-items">${items || '<li style="grid-template-columns:1fr"><span class="ing-name">No ingredient list available for this recipe yet.</span></li>'}</ul>
        </div>`;
    }).join("");
    noteHtml = `Ingredients are grouped by recipe rather than merged into one combined total, since the same-sounding ingredient can mean different things across recipes (e.g. bread flour vs. all-purpose, or lemon juice measured by volume vs. by fruit) - merging them automatically risked showing you an incorrect combined amount. Switch to "By Aisle" to shop by grocery-store section instead.`;
  }

  view.innerHTML = `
    <h2 style="margin-bottom:16px">Shopping List</h2>
    <div class="list-toolbar">
      <div class="groupby-toggle" role="group" aria-label="Group shopping list by">
        <button class="${groupBy==='aisle'?'active':''}" id="groupByAisleBtn" type="button">By Aisle</button>
        <button class="${groupBy==='recipe'?'active':''}" id="groupByRecipeBtn" type="button">By Recipe</button>
      </div>
      <button id="printListBtn">Print list</button>
      <button class="secondary" id="copyListBtn">Copy to clipboard</button>
      <button class="danger" id="clearListBtn">Clear list</button>
    </div>
    <div class="list-note">${noteHtml}</div>
    ${bodyHtml}
  `;

  const aisleBtn = document.getElementById("groupByAisleBtn");
  if(aisleBtn) aisleBtn.addEventListener("click", ()=> setGroupBy("aisle"));
  const recipeBtn = document.getElementById("groupByRecipeBtn");
  if(recipeBtn) recipeBtn.addEventListener("click", ()=> setGroupBy("recipe"));

  const printBtn = document.getElementById("printListBtn");
  if(printBtn) printBtn.addEventListener("click", ()=> window.print());

  const copyBtn = document.getElementById("copyListBtn");
  if(copyBtn) copyBtn.addEventListener("click", ()=>{
    const text = shoppingListPlainText();
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text)
        .then(()=> showToast("Copied to clipboard"))
        .catch(()=> showToast("Could not copy automatically - select and copy the list manually"));
    } else {
      showToast("Clipboard not available in this browser - select and copy the list manually");
    }
  });

  const clearBtn = document.getElementById("clearListBtn");
  if(clearBtn) clearBtn.addEventListener("click", ()=>{
    if(confirm("Clear the entire shopping list?")) clearShoppingList();
  });

  view.querySelectorAll("[data-remove]").forEach(el=>{
    el.addEventListener("click", ()=> removeRecipeFromShoppingList(el.dataset.remove));
  });
  view.querySelectorAll('input[type="checkbox"]').forEach(cb=>{
    cb.addEventListener("change", ()=>{
      toggleShoppingItem(cb.dataset.slug, Number(cb.dataset.idx));
      cb.closest("li").classList.toggle("checked", cb.checked);
    });
  });
}

function renderDetail(slug){
  const r = RECIPES.find(x=>x.slug===slug);
  const content = document.getElementById("detailContent");
  if(!r){
    content.innerHTML = `<div class="detail-body"><p>Recipe not found.</p></div>`;
    return;
  }
  currentServings[slug] = currentServings[slug] || r.servings || null;
  if(currentStep[slug] === undefined) currentStep[slug] = 0;

  const heroImg = r.image ? `<img src="${r.image}" alt="${r.title}" referrerpolicy="no-referrer" loading="lazy" onerror="this.style.display='none'">` : "";
  const hasIngredients = r.ingredients && r.ingredients.length > 0;
  const hasInstructions = r.instructions && r.instructions.length > 0;

  content.innerHTML = `
    <div class="hero">
      ${heroImg}
      ${photoFallbackTag(r)}
      <div class="overlay">
        <div class="cat">${categoryLabel(r.category)}${r.cuisine ? " - "+r.cuisine : ""}</div>
        <div class="detail-title-row">
          <h2>${r.title}</h2>
          <button class="fav-btn-detail${isFavorite(slug)?" active":""}" id="favDetailBtn" type="button">${starSvg(isFavorite(slug))}<span>${isFavorite(slug)?"Favorited":"Add to Favorites"}</span></button>
          <button class="cook-mode-btn${cookingMode?" active":""}" id="cookModeBtn" type="button" title="Bigger text, keeps your screen awake, and steps through instructions one at a time">${cookingMode?"Cooking Mode: On":"Cooking Mode"}</button>
        </div>
      </div>
    </div>
    <div class="detail-body">
      <div class="top-info">
        <div class="stat-box">
          <div class="fact"><span class="label">Prep</span><span class="value">${factString(r.prep_time_minutes)}</span></div>
          <div class="fact"><span class="label">Cook</span><span class="value">${factString(r.cook_time_minutes)}</span></div>
          <div class="fact"><span class="label">Total</span><span class="value">${factString(r.total_time_minutes)}</span></div>
          <div class="fact"><span class="label">Difficulty</span><span class="value">${difficultyMeterHtml(r)}</span></div>
        </div>
        <div class="description-wrap">
          ${r.description ? `<p class="description">${r.description}</p>` : `<p class="description description-na">N.A. — no description recorded yet.</p>`}
          <div class="source-line">${sourceLineHtml(r)}</div>
        </div>
      </div>
      ${(r.diet && r.diet.length) ? `<div class="diet-tags">${r.diet.map(d=>`<span class="tag">${d}</span>`).join("")}</div>` : ""}

      <div class="section">
        <h3>Ingredients</h3>
        ${hasIngredients ? `<button class="add-to-list-btn" id="addToListBtn" type="button">+ Add to Shopping List</button>` : ""}
        ${(hasIngredients && r.servings) ? `
        <div class="servings-control">
          <button id="minusBtn">-</button>
          <span class="count"><span id="servingsCount">${currentServings[slug]}</span> servings</span>
          <button id="plusBtn">+</button>
        </div>` : ""}
        ${hasIngredients ? `<ul class="ingredients" id="ingredientsList"></ul>` : `<div class="missing-box">No ingredient list available yet for this recipe.</div>`}
      </div>

      <div class="section">
        <h3>Instructions</h3>
        ${hasInstructions ? `
        <div class="step-nav" id="stepNav">
          <button type="button" id="stepPrev">&larr; Prev</button>
          <span class="step-indicator" id="stepIndicator"></span>
          <button type="button" id="stepNext">Next &rarr;</button>
        </div>
        <ol class="steps${cookingMode?" step-mode":""}">${r.instructions.map(s=>`<li>${s}</li>`).join("")}</ol>` : `<div class="missing-box">No step-by-step instructions available yet for this recipe.</div>`}
      </div>

      ${r.cooks_notes ? `<div class="section"><h3>Cook's Notes &amp; Tips</h3><div class="notes-box">${r.cooks_notes}</div></div>` : ""}
      ${(r.my_notes && !/^_\(none yet\)_$/.test(r.my_notes) && r.my_notes.trim()) ? `<div class="section"><h3>My Notes</h3><div class="notes-box">${r.my_notes}</div></div>` : ""}

      <button onclick="window.print()" style="margin-top:10px;background:var(--fern);color:#fff;border:none;padding:10px 20px;border-radius:999px;cursor:pointer;font-size:.95rem;">Print recipe</button>

      ${r.incomplete ? `<div class="incomplete-banner" style="margin-top:24px"><strong>This recipe is incomplete.</strong> Its source could not be fully read, so exact quantities and/or steps above may be missing rather than broken.</div>` : ""}
      ${r.missing_info ? renderMissingInfo(r.missing_info) : ""}

      <div class="regen-box">
        <h4>Fix or complete this recipe</h4>
        <p>Open the source Markdown file to edit it directly, or copy a ready-made prompt and paste it in chat so Claude can update ${r.md_path} for you.</p>
        <div class="regen-actions">
          <a href="${r.md_path}" target="_blank" rel="noopener">Open recipe file (.md)</a>
          <button id="copyPromptBtn" type="button">Copy prompt to paste in chat</button>
        </div>
      </div>
    </div>
  `;

  function drawIngredients(){
    if(!hasIngredients) return;
    const factor = r.servings ? (currentServings[slug] / r.servings) : 1;
    document.getElementById("ingredientsList").innerHTML = r.ingredients.map(i => ingredientLine(i, factor)).join("");
    const sc = document.getElementById("servingsCount");
    if(sc) sc.textContent = currentServings[slug];
  }
  drawIngredients();

  // Cooking Mode's "one step at a time" view: keeps every <li> in the DOM
  // (so printing/scanning still sees the full list) but shows only the
  // current one when body.cooking-mode + ol.steps.step-mode are both set.
  function updateStepView(){
    if(!hasInstructions) return;
    const stepNav = document.getElementById("stepNav");
    const listEl = document.querySelector("#detailContent ol.steps");
    if(!listEl) return;
    if(!cookingMode){
      if(stepNav) stepNav.style.display = "none";
      listEl.classList.remove("step-mode");
      return;
    }
    if(stepNav) stepNav.style.display = "flex";
    listEl.classList.add("step-mode");
    const items = listEl.querySelectorAll("li");
    const total = items.length;
    let idx = currentStep[slug] || 0;
    if(idx >= total) idx = total - 1;
    if(idx < 0) idx = 0;
    currentStep[slug] = idx;
    items.forEach((li,i)=> li.classList.toggle("step-active", i===idx));
    const indicator = document.getElementById("stepIndicator");
    if(indicator) indicator.textContent = `Step ${idx+1} of ${total}`;
    const prevBtn = document.getElementById("stepPrev");
    const nextBtn = document.getElementById("stepNext");
    if(prevBtn) prevBtn.disabled = idx === 0;
    if(nextBtn) nextBtn.disabled = idx === total-1;
  }
  updateStepView();

  const stepPrev = document.getElementById("stepPrev");
  const stepNext = document.getElementById("stepNext");
  function scrollToSteps(){
    const listEl = document.querySelector("#detailContent ol.steps");
    if(listEl) window.scrollTo({top: listEl.getBoundingClientRect().top + window.scrollY - 80, behavior:"smooth"});
  }
  if(stepPrev) stepPrev.addEventListener("click", ()=>{
    currentStep[slug] = Math.max(0, (currentStep[slug]||0) - 1);
    updateStepView();
    scrollToSteps();
  });
  if(stepNext) stepNext.addEventListener("click", ()=>{
    const items = document.querySelectorAll("#detailContent ol.steps li");
    currentStep[slug] = Math.min(items.length - 1, (currentStep[slug]||0) + 1);
    updateStepView();
    scrollToSteps();
  });

  const cookModeBtn = document.getElementById("cookModeBtn");
  if(cookModeBtn){
    cookModeBtn.addEventListener("click", ()=>{
      cookingMode = !cookingMode;
      saveCookingMode();
      document.body.classList.toggle("cooking-mode", cookingMode);
      if(cookingMode) requestWakeLock(); else releaseWakeLock();
      renderDetail(slug); // re-render so the button label and step view reflect the new state
    });
  }

  const minus = document.getElementById("minusBtn");
  const plus = document.getElementById("plusBtn");
  if(minus && plus){
    minus.addEventListener("click", ()=>{
      if(currentServings[slug] > 1){ currentServings[slug]--; drawIngredients(); }
    });
    plus.addEventListener("click", ()=>{
      currentServings[slug]++; drawIngredients();
    });
  }

  const addBtn = document.getElementById("addToListBtn");
  if(addBtn){
    addBtn.addEventListener("click", ()=>{
      addRecipeToShoppingList(slug, currentServings[slug] || r.servings || null);
    });
  }

  const favBtn = document.getElementById("favDetailBtn");
  if(favBtn){
    favBtn.addEventListener("click", ()=>{
      toggleFavorite(slug);
      renderDetail(slug);
    });
  }

  const copyPromptBtn = document.getElementById("copyPromptBtn");
  if(copyPromptBtn){
    copyPromptBtn.addEventListener("click", ()=>{
      const text = regenPromptText(r);
      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(text)
          .then(()=> showToast("Prompt copied — paste it in chat"))
          .catch(()=> showToast("Could not copy automatically - select and copy the prompt manually"));
      } else {
        showToast("Clipboard not available in this browser - select and copy the prompt manually");
      }
    });
  }
}

function route(){
  const hash = location.hash;
  document.getElementById("browseView").style.display = "none";
  document.getElementById("detailView").style.display = "none";
  document.getElementById("shoppingListView").style.display = "none";
  document.body.classList.remove("route-shopping-list");

  if(hash.startsWith("#recipe/")){
    const slug = hash.replace("#recipe/","");
    document.getElementById("detailView").style.display = "block";
    renderDetail(slug);
    window.scrollTo(0,0);
  } else if(hash === "#shopping-list"){
    document.getElementById("shoppingListView").style.display = "block";
    document.body.classList.add("route-shopping-list");
    renderShoppingList();
    window.scrollTo(0,0);
  } else {
    document.getElementById("browseView").style.display = "block";
  }
  updateBottomNavActive();
}

document.getElementById("backLink").addEventListener("click", ()=> location.hash = "");
document.getElementById("searchInput").addEventListener("input", (e)=>{
  searchTerm = e.target.value;
  // Search always applies to the full recipe library, not whatever category
  // or Favorites filter happens to be active - so typing a keyword always
  // switches back to "All Recipes" rather than silently searching within a
  // narrower, currently-selected group.
  activeCategory = "all";
  renderSidebar();
  if(location.hash){ location.hash = ""; } // return to the browse grid so search results are visible if a recipe detail page was open
  renderGrid();
  route();
});
document.getElementById("shoppingBtn").addEventListener("click", ()=> location.hash = "#shopping-list");
window.addEventListener("hashchange", route);

// Keeps the sticky sidebar's offset in sync with the sticky header's real
// rendered height (see .sidebar's position:sticky in the CSS) - the header
// isn't a fixed pixel height across font sizes/zoom levels, so this is
// measured rather than hardcoded, and re-measured on resize/orientation
// change and once images/fonts have settled (the "load" event).
function updateHeaderHeightVar(){
  const header = document.querySelector("header.site");
  if(header) document.documentElement.style.setProperty("--header-h", header.offsetHeight + "px");
}
updateHeaderHeightVar();
window.addEventListener("resize", updateHeaderHeightVar);
window.addEventListener("load", updateHeaderHeightVar);

document.getElementById("categorySheetBackdrop").addEventListener("click", closeCategorySheet);
document.getElementById("categorySheetClose").addEventListener("click", closeCategorySheet);
document.getElementById("bnBrowse").addEventListener("click", ()=>{ closeCategorySheet(); goToCategory("all"); });
document.getElementById("bnCategories").addEventListener("click", openCategorySheet);
document.getElementById("bnFavorites").addEventListener("click", ()=>{ closeCategorySheet(); goToCategory("__favorites__"); });
document.getElementById("bnShopping").addEventListener("click", ()=>{ closeCategorySheet(); document.getElementById("shoppingBtn").click(); });

try {
  document.body.classList.toggle("cooking-mode", cookingMode);
  if(cookingMode) requestWakeLock(); // resumes Cooking Mode if it was left on in a previous visit
  renderSidebar();
  renderGrid();
  updateShoppingBadge();
  route();
} catch(e) {
  showErrorBanner(e.message + "\n" + (e.stack||""));
}
</script>
</body>
</html>
